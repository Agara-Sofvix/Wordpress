version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: agara-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - agara-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agara-backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "5001"
    networks:
      - agara-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agara-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - agara-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: agara-admin
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - agara-network

  gateway:
    image: nginx:alpine
    container_name: agara-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./gateway/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - admin
      - backend
    networks:
      - agara-network

volumes:
  mongo_data:


networks:
  agara-network:
    driver: bridge
